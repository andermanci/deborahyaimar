[build]
  command   = "npm run build"
  publish   = "dist"

  # PUBLIC_CLOUDINARY_* son variables intencionalmente públicas (se incrustan
  # en el bundle del cliente para que el navegador suba fotos a Cloudinary).
  # El cloud name y el upload preset no son secretos — es el diseño de la API.
  [build.environment]
    SECRETS_SCAN_OMIT_KEYS = "PUBLIC_CLOUDINARY_CLOUD_NAME,PUBLIC_CLOUDINARY_PRESET"

[functions]
  directory = "netlify/functions"
